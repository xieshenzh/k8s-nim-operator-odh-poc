# LLM NIM Cache with Mirrored Local Model Registry
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMCache
metadata:
  name: meta-llama3-2-1b-instruct-https
spec:
  env:
    - name: NIM_REPOSITORY_OVERRIDE
      value: "https://nim-s3-proxy-xieshen-nim.apps.ai-dev04.kni.syseng.devcluster.openshift.com"
    - name: AWS_PROFILE
      value: "default"
    - name: AWS_REGION
      value: "us-east-1"
  source:
    ngc:
      modelPuller: nvcr.io/nim/meta/llama-3.2-1b-instruct:1.12.0
      pullSecret: ngc-secret
      authSecret: aws-api-secret
      model:
        profiles:
        - 13d24e5a873aea5df261998c94710c6d00b59074f8389143d94a370762569bf8
  storage:
    pvc:
      create: true
      storageClass: ''
      size: "50Gi"
      volumeAccessMode: ReadWriteOnce
  tolerations:
    - effect: NoSchedule
      key: g6e-gpu
      operator: Exists
